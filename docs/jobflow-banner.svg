<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">JobFlow OMS Banner</title>
  <desc id="desc">JOBFLOW in blue and OMS in orange on a dark gradient background.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)" />

  <text x="60" y="155"
        font-family="JetBrains Mono, Fira Code, Menlo, Consolas, monospace"
        font-size="110"
        font-weight="800"
        letter-spacing="4"
        fill="#2D7DD2"
        filter="url(#softGlow)">
    JOBFLOW
  </text>

  <text x="835" y="155"
        font-family="JetBrains Mono, Fira Code, Menlo, Consolas, monospace"
        font-size="110"
        font-weight="800"
        letter-spacing="4"
        fill="#F59E0B"
        filter="url(#softGlow)">
    OMS
  </text>
</svg>
